<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAYEFTY - Réservation Vacances ☀️</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght=400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; }
    </style>
</head>
<body class="bg-gradient-to-br from-amber-50 via-teal-50 to-cyan-100 min-h-screen text-slate-800">

    <header class="bg-amber-400 p-4 shadow-md flex justify-between items-center text-white">
        <h1 class="text-3xl font-extrabold tracking-wider flex items-center gap-2">
            ☀️ SAYEFTY
        </h1>
        <p class="font-semibold hidden sm:block">مرحبا بيك في جو الصيف! 🏖️</p>
    </header>

    <main class="max-w-4xl mx-auto my-10 p-6 bg-white/80 backdrop-blur-md rounded-3xl shadow-xl border border-teal-100">
        
        <h2 class="text-2xl font-bold text-teal-700 text-center mb-8 flex justify-center items-center gap-2">
            🌊 احجز بلاصتك في الشمس
        </h2>

        <form id="reservationForm" class="space-y-6">
            
            <!-- قسم اختيار 3 نزل المفضلة -->
            <div class="bg-amber-50/60 p-5 rounded-2xl border border-amber-200 space-y-4">
                <label class="block text-amber-800 font-bold text-lg">
                    🏨 اختر 3 نزل أو إقامات مفضلة لديك (حسب الأولوية):
                </label>
                
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div>
                        <span class="text-xs font-semibold text-amber-700 block mb-1">1️⃣ الخيار الأول (الأهم):</span>
                        <select id="hotel1" name="hotel1" required class="w-full p-2 rounded-xl border-2 border-amber-300 bg-white text-sm focus:outline-none">
                            <option value="" disabled selected>-- النزل الأول --</option>
                            <option value="Hôtel Mövenpick Sousse">Hôtel Mövenpick (Sousse)</option>
                            <option value="Hôtel El Mouradi Hammamet">Hôtel El Mouradi (Hammamet)</option>
                            <option value="Résidence Les Dunes (Kelibia)">Les Dunes (Kelibia)</option>
                            <option value="Dar Dhiafa (Djerba)">Dar Dhiafa (Djerba)</option>
                        </select>
                    </div>

                    <div>
                        <span class="text-xs font-semibold text-amber-700 block mb-1">2️⃣ الخيار الثاني:</span>
                        <select id="hotel2" name="hotel2" required class="w-full p-2 rounded-xl border-2 border-amber-300 bg-white text-sm focus:outline-none">
                            <option value="" disabled selected>-- النزل الثاني --</option>
                            <option value="Hôtel Mövenpick Sousse">Hôtel Mövenpick (Sousse)</option>
                            <option value="Hôtel El Mouradi Hammamet">Hôtel El Mouradi (Hammamet)</option>
                            <option value="Résidence Les Dunes (Kelibia)">Les Dunes (Kelibia)</option>
                            <option value="Dar Dhiafa (Djerba)">Dar Dhiafa (Djerba)</option>
                        </select>
                    </div>

                    <div>
                        <span class="text-xs font-semibold text-amber-700 block mb-1">3️⃣ الخيار الثالث:</span>
                        <select id="hotel3" name="hotel3" required class="w-full p-2 rounded-xl border-2 border-amber-300 bg-white text-sm focus:outline-none">
                            <option value="" disabled selected>-- النزل الثالث --</option>
                            <option value="Hôtel Mövenpick Sousse">Hôtel Mövenpick (Sousse)</option>
                            <option value="Hôtel El Mouradi Hammamet">Hôtel El Mouradi (Hammamet)</option>
                            <option value="Résidence Les Dunes (Kelibia)">Les Dunes (Kelibia)</option>
                            <option value="Dar Dhiafa (Djerba)">Dar Dhiafa (Djerba)</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- بقية البيانات: الغرف والتواريخ -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="bg-teal-50/60 p-5 rounded-2xl border border-teal-200">
                    <label class="block text-teal-800 font-bold mb-3 text-lg" for="chambre">
                        🛏️ نوع الغرفة المفضل:
                    </label>
                    <select id="chambre" name="chambre" required class="w-full p-3 rounded-xl border-2 border-teal-300 bg-white focus:outline-none">
                        <option value="" disabled selected>-- اختر نوع الغرفة --</option>
                        <option value="Chambre Single (فردية)">Chambre Single (فردية)</option>
                        <option value="Chambre Double (مزدوجة)">Chambre Double (مزدوجة)</option>
                        <option value="Chambre Familiale (عائلية)">Chambre Familiale (عائلية)</option>
                    </select>
                </div>

                <div class="bg-teal-50/60 p-5 rounded-2xl border border-teal-200">
                    <label class="block text-teal-800 font-bold mb-3 text-lg">
                        📅 تاريخ الإقامة:
                    </label>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <div>
                            <span class="text-xs font-semibold text-teal-600 block mb-1">من:</span>
                            <input type="date" id="dateArrivee" name="dateArrivee" required class="w-full p-2 rounded-xl border-2 border-teal-300 bg-white">
                        </div>
                        <div>
                            <span class="text-xs font-semibold text-teal-600 block mb-1">إلى:</span>
                            <input type="date" id="dateDepart" name="dateDepart" required class="w-full p-2 rounded-xl border-2 border-teal-300 bg-white">
                        </div>
                    </div>
                </div>
            </div>

            <!-- معلومات العميل: تم فصل الهاتف والرقم الآلي في خانات مستقلة -->
            <div class="p-5 bg-slate-50 rounded-2xl border border-gray-200 space-y-4">
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-semibold text-gray-600 mb-1">الاسم واللقب:</label>
                        <input type="text" id="clientName" name="clientName" placeholder="محمد بن علي" required class="w-full p-2 rounded-xl border border-gray-300 bg-white">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-600 mb-1">عدد الأشخاص:</label>
                        <input type="number" id="pax" name="pax" min="1" value="2" required class="w-full p-2 rounded-xl border border-gray-300 bg-white">
                    </div>
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <!-- خانة الهاتف العادي -->
                    <div>
                        <label class="block text-sm font-semibold text-gray-600 mb-1">📞 الهاتف:</label>
                        <input type="tel" id="clientPhone" name="clientPhone" placeholder="98123456" required class="w-full p-2 rounded-xl border border-gray-300 bg-white">
                    </div>
                    <!-- خانة الرقم الآلي المستقلة -->
                    <div>
                        <label class="block text-sm font-semibold text-gray-600 mb-1">🤖 الرقم الآلي:</label>
                        <input type="text" id="clientRobot" name="clientRobot" placeholder="الرقم الآلي الخاص بالحساب" required class="w-full p-2 rounded-xl border border-gray-300 bg-white">
                    </div>
                </div>
                
                <div>
                    <label class="block text-sm font-semibold text-gray-600 mb-1">📝 طلبات خاصة أخرى:</label>
                    <textarea id="description" name="description" rows="2" placeholder="أية ملاحظات أخرى تود إضافتها..." class="w-full p-2 rounded-xl border border-gray-300 bg-white"></textarea>
                </div>
            </div>

            <div class="text-center pt-4">
                <button type="submit" id="submitBtn" class="bg-gradient-to-r from-amber-500 to-orange-500 text-white font-bold text-xl py-4 px-12 rounded-full shadow-lg transform hover:scale-105 transition-all cursor-pointer">
                    🌊 احجز توة وعوم بحرك!
                </button>
            </div>
        </form>

        <hr class="my-10 border-dashed border-teal-200">

        <div id="recapSection" class="hidden bg-emerald-50 border-2 border-emerald-400 p-6 rounded-3xl transition-all">
            <div class="flex items-center gap-3 text-emerald-700 font-bold text-xl mb-4">
                <span>✅</span>
                <h3>تم تسجّيل حجزك بنجاح في نظامنا!</h3>
            </div>
            
            <a id="recapLink" href="#" target="_blank" class="inline-block bg-teal-600 hover:bg-teal-700 text-white font-semibold py-3 px-6 rounded-xl shadow transition-all mb-4">
                🔗 اضغط هنا لعرض تفاصيل الحجز الشاملة وطباعتها
            </a>
        </div>

    </main>

    <script>
        document.getElementById('reservationForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const btn = document.getElementById('submitBtn');
            btn.innerText = "جاري تسجيل الحجز... ⏳";
            btn.disabled = true;

            // ⚠️ ضع رابط الـ Web App الجديد هنا:
            const googleScriptUrl = "https://script.google.com/macros/s/AKfycbz3qRjuygo1oQhCpRvq_1LQ8bROfTjMm8S6L8qhpf0qXX7BbF8V2a4fqzuufNHHUfEvAw/exec";

            const formData = new FormData(this);

            fetch(googleScriptUrl, {
                method: 'POST',
                mode: 'no-cors',
                body: formData
            })
            .then(() => {
                btn.innerText = "🌊 احجز توة وعوم بحرك!";
                btn.disabled = false;
                
                document.getElementById('recapSection').classList.remove('hidden');
                
                const name = document.getElementById('clientName').value;
                const phone = document.getElementById('clientPhone').value;
                const robot = document.getElementById('clientRobot').value;
                const h1 = document.getElementById('hotel1').value;
                const h2 = document.getElementById('hotel2').value;
                const h3 = document.getElementById('hotel3').value;
                const chambre = document.getElementById('chambre').value;
                const dateArrivee = document.getElementById('dateArrivee').value;
                const dateDepart = document.getElementById('dateDepart').value;
                const pax = document.getElementById('pax').value;
                const desc = document.getElementById('description').value;

                // كود الـ Ticket مفصل فيه الهاتف والرقم الآلي
                const invoiceHTML = `<html><head><title>Ticket</title><link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet"></head><body class="bg-gray-100 p-8 flex justify-center items-center min-h-screen"><div class="bg-white p-8 rounded-2xl shadow-xl max-w-md w-full border-t-8 border-amber-400"><div class="text-center mb-4"><h1 class="text-2xl font-bold">☀️ SAYEFTY RESA</h1><p class="text-green-600 font-semibold">CONFIRMATION</p></div><div class="space-y-3 text-sm text-gray-700"><p><strong>CLIENT:</strong> ${name}</p><p><strong>TEL:</strong> ${phone}</p><p><strong>N° AUTOMATIQUE (الرقم الآلي):</strong> ${robot}</p><div class="p-2 bg-yellow-50 rounded-lg"><p class="font-semibold text-amber-800">CHOIX DES HÔTELS:</p><p class="pl-2">1. ${h1}</p><p class="pl-2">2. ${h2}</p><p class="pl-2">3. ${h3}</p></div><p><strong>CHAMBRE:</strong> ${chambre}</p><p><strong>DU:</strong> ${dateArrivee} <strong>AU:</strong> ${dateDepart}</p><p><strong>PAX:</strong> ${pax}</p><p><strong>NOTE:</strong> ${desc || '-'}</p></div><button onclick="window.print()" class="w-full mt-6 bg-blue-500 text-white py-2 rounded-xl">Imprimer</button></div></body></html>`;
                
                const blob = new Blob([invoiceHTML], { type: 'text/html' });
                document.getElementById('recapLink').href = URL.createObjectURL(blob);
                document.getElementById('recapSection').scrollIntoView({ behavior: 'smooth' });
            })
            .catch(error => {
                alert("حدث خطأ في الاتصال، حاول مجدداً.");
                btn.disabled = false;
            });
        });
    </script>
</body>
</html>
